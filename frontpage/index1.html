<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 白头叶猴保护平台</title>
    <!-- 修改：使用 url_for 引用 CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='wangye.css') }}">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <!-- ======= 新增光影层 ======= -->
    <div class="light-effects">
        <div class="glow-circle blue" style="top:20%; left:10%"></div>
        <div class="glow-circle purple" style="top:70%; right:15%"></div>
    </div>
    <!-- 修改：视频背景使用 url_for -->
    <video class="bg-video" autoplay muted loop playsinline>
        <source src="{{ url_for('static', filename='videos/bg-video.mp4') }}" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div class="container">
        <div class="card-logo">
            <!-- 修改：logo图片使用 url_for -->
            <img src="{{ url_for('static', filename='wangyelogo.png') }}" alt="白头叶猴保护平台">
        </div>
        <div class="glassmorphism-card">
            <!-- 注册表单 -->
            <div class="form-box register">
                <form action="#">
                    <h1>🌱 成为保护者</h1>
                    <div class="input-box">
                        <input type="text" placeholder="Username" class="neon-input" required id="username">
                        <i class='bx bxs-user'></i>
                    </div>
                    <div class="input-box">
                        <i class='bx bxs-lock-alt'></i>
                        <input type="password" placeholder="Password" class="neon-input" required id="password">
                        <div class="input-glow"></div>
                    </div>
                    <button type="button" class="btn register-submit-btn" onclick="register()">注册</button>
                </form>
            </div>
            <div class="toggle-panel toggle-left">
                <h1>🐒 欢迎来到白头叶猴守护区！</h1>
                <p>还没有守护者账号？</p>
                <!-- 返回按钮，跳转到登录页面 -->
                <!-- 返回按钮，跳转到登录页面 - 使用 url_for 生成路径 -->
                <button class="btn register-btn"
                    onclick="window.location.href='{{ url_for('login_page') }}'">返回登录界面</button>
                <!-- 新增科技说明文字 -->
                <div class="neon-footer">
                    <p>EcoListen：基于深度降噪的濒危物种智能监测平台</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api';

        async function register() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE_URL}/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password }),
                });
                const data = await response.json();

                // 弹出后端的提示语（比如：注册成功）
                alert(data.message);

                // 如果成功了，自动跳转回登录页
                if (data.success) {
                    window.location.href = '{{ url_for('login_page') }}';
                }
            } catch (error) {
                alert('网络连接失败，请确认后端已启动');
            }
        }
        //添加页面加载时清空用户名和密码的逻辑
        window.onload = function () {
            // 清空用户名和密码输入框
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        };

    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.2/vanilla-tilt.min.js"></script>
    <script>
        // 给玻璃卡片加上 3D 动效和反光
        VanillaTilt.init(document.querySelector(".glassmorphism-card"), {
            max: 8,           // 最大倾斜角度
            speed: 400,       // 倾斜速度
            glare: true,      // 开启反光效果
            "max-glare": 0.2  // 反光强度
        });
    </script>

    <script>
        // 打字机特效
        const titleElement = document.querySelector('.toggle-panel h1');
        const originalText = titleElement.innerText;
        titleElement.innerText = ''; // 清空原本的字

        let i = 0;
        function typeWriter() {
            if (i < originalText.length) {
                titleElement.innerHTML += originalText.charAt(i);
                i++;
                // 打字速度，50-150毫秒随机，模拟真人敲击
                setTimeout(typeWriter, Math.random() * 100 + 50);
            }
        }
        // 页面加载完成后延迟 0.5 秒开始打字
        setTimeout(typeWriter, 500);
    </script>

</body>

</html>
